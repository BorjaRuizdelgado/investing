<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0f3d2e"/>
    </linearGradient>
    <style>
      .bg { fill: url(#g); }
      .title { font-family: 'DM Sans', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; font-size:44px; fill:#fff; font-weight:700 }
      .subtitle { font-family: 'DM Sans', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; font-size:22px; fill:#cfead5 }
      .chip { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.06); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="630" rx="24"/>
  <g transform="translate(60,90)">
    <rect class="chip" x="0" y="0" width="1080" height="450" rx="18"/>
    <text x="48" y="80" class="title">Borja Ruizdelgado</text>
    <text x="48" y="124" class="subtitle">Options Implied Forecast</text>

    <g transform="translate(48,170)">
      <!-- simple chart-like shapes -->
      <rect x="0" y="120" width="520" height="8" fill="#0ea5a4" rx="4" />
      <path d="M0 120 C80 40 160 140 240 80 C320 20 400 160 480 120" stroke="#7dd3fc" stroke-width="6" fill="none" stroke-linecap="round"/>
      <circle cx="480" cy="120" r="8" fill="#fff" />
    </g>

    <text x="48" y="420" class="subtitle">Interactive charts from live options: implied distributions, expected moves, IV smile</text>
  </g>
</svg>
